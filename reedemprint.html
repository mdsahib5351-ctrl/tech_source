<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="https://i.ibb.co/TBzgsbMS/TS-logo-with-vibrant-gradients.jpg" type="image/jpeg">
<title>TECH SOURCE - Redeem Code</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f0f2f5;
  }

  /* Main voucher container */
  #voucher {
    position: relative;
    width: 105mm;       /* A6 width */
    height: 148mm;      /* A6 height */
    background-image: url('https://i.ibb.co/wFHVVybS/Chat-GPTImage-Mar17202602-59-44-P.jpg');
    background-size: cover;   /* cover image */ 
    background-position: center;  /* center image */
    padding: 15mm;              /* padding for content */
    border-radius: 8px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    box-sizing: border-box;
  }

  /* Overlay for readability */
  #voucher::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-color: rgba(255,255,255,0.6);
    border-radius: 8px;
    z-index: 0;
  }

  #voucher > * {
    position: relative;
    z-index: 1;
    text-align: center;
  }

  #logo {
    width: 50px;
    height: 50px;
    margin-bottom: 10px;
  }

  #voucher h2 {
    color: #007bff;
    margin-bottom: 5px;
    font-size: 22px;
  }

  #voucher p {
    margin: 5px 0 10px 0;
    font-size: 14px;
    color: #333;
  }

  /* Input section */
  #inputSection {
    margin-top: 15px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Redeem input */
  #redeem {
    width: 80%;           
    padding: 8px 10px;    
    font-size: 14px;      
    border-radius: 6px;
    border: 1px solid #ccc;
    letter-spacing: 2px;
    margin-bottom: 10px;
    box-sizing: border-box;
  }

  /* Code box */
  #codeBox {
    display: inline-block;
    background: transparent;
    color: #000000;
    padding: 10px 20px;
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 2.5px;
    border-radius: 8px;
    margin-top: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    white-space: nowrap;
  }

  /* Buttons */
  .btn-group button {
    padding: 10px 18px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background-color: #007bff;
    color: #fff;
    cursor: pointer;
    margin: 5px;
    transition: all 0.3s ease;
  }

  .btn-group button:hover {
    background-color: #0056b3;
  }

  #message {
    margin-top: 10px;
    font-weight: bold;
    font-size: 14px;
    color: green;
  }

  /* Note */
  #voucher .note {
    font-size: 10px;
    margin-top: 8px;
    color: #333;
  }

  /* Print styles for exact A6 */
  @media print {
    @page {
      size: A6 portrait;
      margin: 0;
    }
    body * {
      visibility: hidden;
    }
    #voucher, #voucher * {
      visibility: visible;
    }
    #voucher {
      box-shadow: none;
      margin: 0;
      width: 105mm;
      height: 148mm;
      padding: 0;
      page-break-after: avoid;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    #inputSection {
      display: none; /* hide input/buttons in print */
    }
  }
</style>
</head>
<body>

<div id="voucher">
  <img id="logo" src="https://i.ibb.co/tM1FzS9H/Chat-GPT-Image-Feb-26-2026-04-14-09-PM.jpg" alt="Logo">
  <h2>TECH SOURCE</h2>
  <p>Trusted Vouchers & Codes for Customers</p>
  <p>Your Redeem Code:</p>
  <div id="codeBox"></div>
  <p class="note">“Your special code is ready! Redeem it on Play Store and enjoy 🎁”</p>

  <div id="inputSection">
    <input type="text" id="redeem" maxlength="19" placeholder="XXXX-XXXX-XXXX-XXXX" aria-label="Enter redeem code">
    <div class="btn-group">
      <button onclick="pasteCode()">Paste Code</button>
      <button onclick="printCode()">Print Code</button>
    </div>
    <div id="message"></div>
  </div>
</div>

<script>
const redeemInput = document.getElementById('redeem');
const codeBox = document.getElementById('codeBox');

// Auto-format code as XXXX-XXXX-XXXX-XXXX
redeemInput.addEventListener('input', function() {
  let value = redeemInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  value = value.slice(0,16);
  let formatted = '';
  for(let i=0;i<value.length;i++){
    if(i>0 && i%4===0) formatted += '-';
    formatted += value[i];
  }
  redeemInput.value = formatted;
});

// Paste from clipboard
async function pasteCode(){
  try{
    const text = await navigator.clipboard.readText();
    const cleanText = text.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,16);
    let formatted='';
    for(let i=0;i<cleanText.length;i++){
      if(i>0 && i%4===0) formatted += '-';
      formatted += cleanText[i];
    }
    redeemInput.value = formatted;
    codeBox.textContent = formatted;
    document.getElementById('message').textContent="Code clipboard se paste ho gaya!";
  }catch(e){
    alert("Clipboard access failed! Please paste manually.");
  }
}

// Print function
function printCode(){
  if(!redeemInput.value){
    alert("Please enter a code!");
    return;
  }
  codeBox.textContent = redeemInput.value;
  window.print();
}
</script>
</body>
</html>
