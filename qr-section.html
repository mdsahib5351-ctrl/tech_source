<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4e73df">
<title>Quick QR - Pro UPI Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/qr-code-styling/lib/qr-code-styling.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Poppins',sans-serif;
min-height:100vh;
display:flex;
flex-direction:column;
background:linear-gradient(-45deg,#4e73df,#6f42c1,#00c6ff,#0072ff);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
transition:0.4s;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.header{
padding:20px;
text-align:center;
font-size:22px;
font-weight:700;
color:white;
}

.container{
margin:20px;
padding:30px;
border-radius:25px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(25px);
box-shadow:0 25px 50px rgba(0,0,0,0.25);
animation:floatCard 6s ease-in-out infinite;
transition:0.4s;
}

@keyframes floatCard{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

h2{
text-align:center;
margin-bottom:20px;
color:white;
}

label{
font-size:13px;
font-weight:600;
color:white;
}

input,select{
width:100%;
padding:14px;
margin:10px 0;
border-radius:15px;
border:none;
font-size:14px;
background:rgba(255,255,255,0.2);
color:white;
transition:0.3s;
}

input::placeholder{color:#eee}

input:focus,select:focus{
outline:none;
box-shadow:0 0 15px rgba(255,255,255,0.6);
background:rgba(255,255,255,0.3);
}

button{
width:100%;
padding:15px;
border:none;
border-radius:40px;
font-size:15px;
color:white;
margin-top:15px;
cursor:pointer;
font-weight:600;
transition:0.3s;
}

.generate{
background:linear-gradient(45deg,#ff416c,#ff4b2b);
}

.download{
background:linear-gradient(45deg,#00c853,#64dd17);
}

button:hover{
transform:translateY(-3px) scale(1.03);
}

#qrPreview{
margin-top:25px;
display:flex;
justify-content:center;
}

/* Dark Mode */
body.dark{
background:linear-gradient(-45deg,#000428,#004e92,#000000,#1f1f1f);
}

body.dark .container{
background:rgba(0,0,0,0.5);
}

body.dark input,
body.dark select{
background:rgba(255,255,255,0.1);
}

@media(max-width:480px){
.container{margin:15px;padding:20px}
}
</style>
</head>

<body>

<div class="header">Quick QR</div>

<div class="container">
<h2>Pro UPI QR Generator</h2>

<input type="text" id="upi" placeholder="UPI ID (example@bank)">
<input type="number" id="amount" placeholder="Amount ₹ (optional)">
<input type="text" id="name" placeholder="Name">
<input type="text" id="note" placeholder="Note">

<label>QR Color</label>
<input type="color" id="qrColor" value="#000000">

<label>QR Dot Style</label>
<select id="dotStyle">
<option value="rounded">Rounded</option>
<option value="dots">Dots</option>
<option value="classy">Classy</option>
<option value="square">Square</option>
</select>

<label>Corner Style</label>
<select id="cornerStyle">
<option value="extra-rounded">Extra Rounded</option>
<option value="square">Square</option>
<option value="dot">Dot</option>
</select>

<label>Center Logo</label>
<input type="file" id="logoInput">

<label>
<input type="checkbox" id="darkMode"> Dark Mode
</label>

<button class="generate" onclick="generateQR()">Generate Stylish QR</button>
<button class="download" onclick="downloadQR()">Download QR</button>

<div id="qrPreview"></div>

</div>

<script>

let qrCode = new QRCodeStyling({
width:250,
height:250,
type:"canvas",
data:"",
dotsOptions:{color:"#000",type:"rounded"},
cornersSquareOptions:{type:"extra-rounded"},
backgroundOptions:{color:"#ffffff"}
});

qrCode.append(document.getElementById("qrPreview"));

window.onload = function(){
if(localStorage.getItem("upi")) upi.value = localStorage.getItem("upi");
if(localStorage.getItem("name")) name.value = localStorage.getItem("name");
if(localStorage.getItem("note")) note.value = localStorage.getItem("note");
if(localStorage.getItem("qrColor")) qrColor.value = localStorage.getItem("qrColor");
generateQR();
};

function saveData(){
localStorage.setItem("upi", upi.value);
localStorage.setItem("name", name.value);
localStorage.setItem("note", note.value);
localStorage.setItem("qrColor", qrColor.value);
}

function generateQR(){

const upiPattern=/^[a-zA-Z0-9.\-_]{2,}@[a-zA-Z]{2,}$/;

if(!upi.value) return;

if(!upiPattern.test(upi.value)){
alert("Enter Valid UPI ID (example@bank)");
return;
}

saveData();

let upiLink=`upi://pay?pa=${encodeURIComponent(upi.value)}&pn=${encodeURIComponent(name.value)}&cu=INR`;

if(amount.value){
upiLink+=`&am=${encodeURIComponent(amount.value)}`;
}

if(note.value){
upiLink+=`&tn=${encodeURIComponent(note.value)}`;
}

document.querySelector(".generate").innerText="Generating...";

qrCode.update({
data:upiLink,
dotsOptions:{color:qrColor.value,type:dotStyle.value},
cornersSquareOptions:{type:cornerStyle.value}
});

setTimeout(()=>{
document.querySelector(".generate").innerText="Generate Stylish QR";
},400);

}

document.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("change",generateQR);
});

logoInput.addEventListener("change",function(){
const file=this.files[0];
if(file){
const reader=new FileReader();
reader.onload=function(e){
qrCode.update({image:e.target.result});
}
reader.readAsDataURL(file);
}
});

function downloadQR(){
qrCode.download({name:"UPI_QR",extension:"png"});
}

darkMode.addEventListener("change",function(){
document.body.classList.toggle("dark");
});

</script>

</body>
</html>
