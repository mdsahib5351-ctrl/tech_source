<label>Customer Name</label>
<input type="text" id="customerName" placeholder="Enter customer name">
</div>

<div class="billing-field">
<label>Mobile Number</label>
<input type="text" id="customerMobile" placeholder="Enter mobile number" maxlength="10">
</div>

</div>
</div>
<button class="btn-primary" onclick="generateBill()">Generate Bill</button>
<button class="btn-primary" onclick="window.print()">Print</button>

<button class="btn-secondary" onclick="window.open('professionalbill.html')">
Professional Invoice
</button>
<button class="btn-secondary" onclick="window.open('BILL HISTORY.html')">
All History</button>

<!-- BILL AREA -->
<div id="bill">

<div class="bill-left">
<div class="bill-header">
<div>Bill No: <span id="billNo"></span></div>
<div>Date: <span id="billDate"></span></div>
</div>
<div id="customerDetails" style="font-size:14px; margin-bottom:10px;"></div>
<div id="billServices"></div>
<h3 id="subtotalRow">Total: ₹ <span id="totalAmount">0</span></h3>
<h4>Discount: ₹ <span id="discountAmount">0</span></h4>
<h3>Final Total: ₹ <span id="finalTotal">0</span></h3>
<h4>Payment Mode: <span id="modeText"></span></h4>
<h4>Status: <span id="statusText"></span></h4>
</div>

<div class="bill-right">
<div id="qrcode"></div>
</div>
<div class="signature-section">

    <div class="signature-box">
        <img src="https://i.ibb.co/S4yC4WXs/IMG-20260221-WA0000.webp" alt="AUTHORIZED BY" class="logo">
    </div>

</div>
</div>

</div>

<script>
const paymentStatus = document.getElementById("paymentStatus");
const paymentModeWrapper = document.getElementById("paymentModeWrapper");

function togglePaymentMode(){
    if(paymentStatus.value === "Paid"){
        paymentModeWrapper.style.display = "block";
    }else{
        paymentModeWrapper.style.display = "none";
    }
}

// Page load par check kare
togglePaymentMode();

// Change hone par check kare
paymentStatus.addEventListener("change", togglePaymentMode);
function generateBill(){

let services = document.querySelectorAll(".service");
let qtyInputs = document.querySelectorAll(".qty");

let incomeType = document.querySelector(".incomeType");
let casteType = document.querySelector(".casteType");
let residentialType = document.querySelector(".residentialType");
let ewsType = document.querySelector(".ewsType");

let billServices = document.getElementById("billServices");
billServices.innerHTML = "";

let total = 0;

for(let i=0; i<services.length; i++){

if(services[i].checked){

let name = "";
let price = 0;
let qty = parseInt(qtyInputs[i].value) || 1;

if(services[i].classList.contains("incomeCheck")){
    name = "Income Certificate (" + incomeType.options[incomeType.selectedIndex].text + ")";
    price = parseInt(incomeType.value);
}
else if(services[i].classList.contains("casteCheck")){
    name = "Caste Certificate (" + casteType.options[casteType.selectedIndex].text + ")";
    price = parseInt(casteType.value);
}
else if(services[i].classList.contains("residentialCheck")){
    name = "Residential Certificate (" + residentialType.options[residentialType.selectedIndex].text + ")";
    price = parseInt(residentialType.value);
}
else if(services[i].classList.contains("ewsCheck")){
    name = "EWS Certificate (" + ewsType.options[ewsType.selectedIndex].text + ")";
    price = parseInt(ewsType.value);
}
else{
    name = services[i].dataset.name;
    price = parseInt(services[i].dataset.price);
}

let subtotal = price * qty;
total += subtotal;

billServices.innerHTML += `<p>${name} × ${qty} = ₹${subtotal}</p>`;
}
}

let discount = parseFloat(document.getElementById("discountInput").value) || 0;

if(discount > total){
    discount = total;
}

let finalTotal = total - discount;

document.getElementById("totalAmount").innerText = total;

let subtotalRow = document.getElementById("subtotalRow");
let discountRow = document.getElementById("discountAmount").parentElement;

// Show subtotal & discount only if discount > 0
if(discount > 0){
    subtotalRow.style.display = "block";    // Subtotal dikhaye
    discountRow.style.display = "block";    // Discount dikhaye
    document.getElementById("discountAmount").innerText = discount;
}else{
    subtotalRow.style.display = "none";     // Subtotal hide
    discountRow.style.display = "none";     // Discount hide
}

document.getElementById("finalTotal").innerText = finalTotal;
document.getElementById("billNo").innerText = "TS" + Math.floor(Math.random()*10000);
document.getElementById("billDate").innerText = new Date().toLocaleDateString();
let customerName = document.getElementById("customerName").value;
let customerMobile = document.getElementById("customerMobile").value;

document.getElementById("customerDetails").innerHTML =
`<strong>Name:</strong> ${customerName}<br>
<strong>Mobile:</strong> ${customerMobile}`;

// UPI QR
let upiID = "9661905351@ybl";
let upiURL = `upi://pay?pa=${upiID}&pn=TECH SOURCE Service&am=${finalTotal}&cu=INR`;

document.getElementById("qrcode").innerHTML = "";

new QRCode(document.getElementById("qrcode"), {
text: upiURL,
width:155,
height:155,
});

// 👇 YAHAN ADD KARO
let status = document.getElementById("paymentStatus").value;
let statusText = document.getElementById("statusText");
let mode = document.getElementById("paymentMode").value;
document.getElementById("modeText").innerText = mode;

statusText.innerText = status;

if(status === "Paid"){
    statusText.className = "status-paid";
} else {
    statusText.className = "status-unpaid";
}
// ===== SAVE BILL DATA =====

let billData = {
    billNo: document.getElementById("billNo").innerText,
    date: document.getElementById("billDate").innerText,
    name: customerName,
    mobile: customerMobile,
    services: billServices.innerHTML,
    subtotal: total,
    total: finalTotal,
discount: discount,
    status: status,
    paymentMode: document.getElementById("paymentMode").value
};

let allBills = JSON.parse(localStorage.getItem("allBills")) || [];

// Duplicate check
let exists = allBills.some(b => b.billNo === billData.billNo);

if(!exists){
    allBills.push(billData);
    localStorage.setItem("allBills", JSON.stringify(allBills));
}

}
document.getElementById("subtotalRow").style.display = "none";
document.getElementById("discountAmount").parentElement.style.display = "none";
function downloadBill(){
html2canvas(document.querySelector("#bill"), {
    scale: 2,
    useCORS: true,     // ✅ important
    allowTaint: false  // ✅ important
}).then(canvas => {
    let link = document.createElement("a");
    link.download = "TECH_SOURCE_Bill.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
});
}
</script>
</body>
</html>
