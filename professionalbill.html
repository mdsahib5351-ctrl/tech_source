<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Professional Invoice - TECH SOURCE</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
/* ===== Body & Main Container ===== */
body{
    margin:0;
    background:#f0f0f0;
    font-family:Arial;
}

.invoice-container{
    width:210mm;
    min-height:297mm;
    margin:20px auto;
    padding:0;
    box-sizing:border-box;
    position:relative;
}

/* Outer Border (poore page) */
.outer-border{
    border:2px solid #000;
    padding:5px;
    box-sizing:border-box;
}

/* Inner Border (content ke aas-paas) */
.inner-border{
    border:1px solid #000;
    padding:20px;
    background: rgba(255,255,255,0.95); /* slightly transparent */
    box-sizing:border-box;
    position:relative;
    z-index:1;
}
.logo{
    width:100px;
}


/* ===== Sections ===== */
.section{
    margin-top:15px;
}

/* ===== Service Table ===== */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

table th, table td{
    border:1px solid #000;
    padding:6px;
    font-size:14px;
}

@keyframes glowEffect{
    0%{ box-shadow:0 0 10px rgba(0,180,0,0.4); }
    50%{ box-shadow:0 0 25px rgba(0,180,0,0.8); }
    100%{ box-shadow:0 0 10px rgba(0,180,0,0.4); }
}

.signature-paid{
    border-color:#0a8f2f !important;
    animation:glowEffect 2s infinite;
}

table th{
    background:#f2f2f2;
}

/* ===== Summary Table (corner table) ===== */
.summary-table-container{
    position:absolute;
    bottom:20px;
    right:20px;
    z-index:1;
}

.summary-table{
    width:300px;
    border-collapse:collapse;
    margin-top:15px;
    font-size:14px;
}

.summary-table th, .summary-table td{
    border:1px solid #000;
    padding:4px 8px;
}

.summary-table th{
    background:#f2f2f2;
    width:50%;
    font-weight:normal;
}

.summary-table td{
    text-align:right;
    font-weight:bold;
}

.tick-circle{
    display:inline-block;
    width:26px;
    height:26px;
    line-height:26px;
    text-align:center;
    background:#0a8f2f;
    color:white;
    border-radius:50%;
    font-size:16px;
    margin-right:6px;
}
/* ===== Total & Final Total ===== */
.total-box{
    text-align:right;
    margin-top:10px;
    font-size:16px;
}

.final-total{
    font-size:20px;
    font-weight:bold;
}

/* ===== Signature Section ===== */
.signature-section{
    margin-top:40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

#qrcode{
    width: 125px;
    height:125px;
    border: #000 solid 1px;
    padding: 5px;
}

/* ===== Buttons ===== */
.buttons{
    text-align:center;
    margin:20px;
}

button{
    padding:10px 20px;
    margin:5px;
    cursor:pointer;
}
.qr-container{
    position:relative;
    width:125px;
}

.paid-stamp{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) rotate(-20deg);
    font-size:28px;
    font-weight:bold;
    color:red;
    border:3px solid red;
    padding:8px 15px;
    border-radius:8px;
    opacity:0.85;
    display:none;
    pointer-events:none;
    background:rgba(255,255,255,0.3);
    backdrop-filter: blur(2px);
}
.qr-paid{
    color:#0a8f2f;        /* Green */
    font-size:22px;       /* Bigger */
    font-weight:900;      /* Bold */
    letter-spacing:2px;
}
/* Content watermark ke upar */
.invoice-container > *:not(.watermark){
    position:relative;
    z-index:1;
}
.qr-text{
    text-align:center;
    font-size:14px;
    font-weight:bold;
    margin-top:5px;
}
.imglogo{
    width: 150px;
    text-align:center;
    font-size:14px;
    font-weight:bold;
    border: #000 solid 1px;
    padding: 5px;

}
.header-banner{
    width:100%;
    border-bottom:2px solid #000;
    margin-bottom:10px;
}

.header-banner img{
    width:100%;
    height:auto;
    display:block;
}

.invoice-container{
    width:210mm;
    min-height:297mm;
    margin:20px auto;
    padding:0;
    box-sizing:border-box;
    position:relative;
}
/* 🔥 Center Watermark */
.inner-border{
    border:1px solid #000;
    padding:20px;
    background:white;
    box-sizing:border-box;
    position:relative;
}

.inner-border::before{
    content:"";
    position:absolute;
    top:60%;
    left:50%;
    transform:translate(-50%,-50%);
    width:65%;
    height:65%;
    background: url("https://i.ibb.co/B20vV9nR/Screenshot-2026-02-27-06-27-39-13.webp") no-repeat center;
    background-size:contain;
    opacity:0.3;
    pointer-events:none;
}
.signature-section{
    position:relative;
    z-index:5;
}
.status-paid{
    background:#e6ffe6;
    color:#008000;
    padding:3px 8px;
    border-radius:4px;
}

.status-unpaid{
    background:#ffe6e6;
    color:#cc0000;
    padding:3px 8px;
    border-radius:4px;
}
</style>
</head>

<body>

<div class="invoice-container" id="invoice">

   <!-- Outer border (poore page) -->
   <div class="outer-border">

       <!-- Inner border: content ke aas-paas -->
       <div class="inner-border">
        <div class="header-banner">
    <img src="https://i.ibb.co/Z6gvXY4v/IMG-20260226-WA0004.webp" alt="TECH SOURCE Banner">
</div>

           <div class="section">
               <strong>Bill No:</strong> <span id="billNo"></span> |
               <strong>Date:</strong> <span id="billDate"></span>
           </div>

           <div class="section" id="customerSection"></div>

           <div class="section">
               <table>
                   <thead>
                       <tr>
                           <th>Service</th>
                           <th>Amount</th>
                       </tr>
                   </thead>
                   <tbody id="serviceTable"></tbody>
               </table>
           </div>

           <div class="section">
               <table class="summary-table">
                   <tbody>
                       <tr>
                           <th>Subtotal</th>
                           <td>₹ <span id="subtotal"></span></td>
                       </tr>
                       <tr>
                           <th>Discount</th>
                           <td>₹ <span id="discount"></span></td>
                       </tr>
                       <tr>
                           <th>Final Total</th>
                           <td>₹ <span id="finalTotal"></span></td>
                       </tr>
                       <tr>
                           <th>Payment Mode</th>
                           <td><span id="paymentMode"></span></td>
                       </tr>
                       <tr>
                           <th>Status</th>
                           <td><span id="status"></span></td>
                       </tr>
                   </tbody>
               </table>
           </div>

           <div class="signature-section">
    <div>
    <div class="qr-container">
    <div id="qrcode"></div>
    <div class="paid-stamp" id="paidStamp">PAID</div>
    <div class="qr-text" id="qrText">Scan and Pay</div>
    </div> </div>
    <div class="imglogo">
        <img src="https://i.ibb.co/z0kTrtq/IMG-20260226-WA0000-removebg-preview.webp" width="120"><br>
        Authorized Signature
    </div>
</div>

       </div> <!-- inner-border end -->

   </div> <!-- outer-border end -->
   <div class="buttons">
    <button onclick="downloadPDF()">Download PDF</button>
    <button onclick="downloadJPG()">Download JPG</button>
    <button onclick="window.print()">Print</button>
    <button onclick="window.close()">Close</button>
</div>

</div> <!-- invoice-container end -->

<script>

// LOAD LATEST BILL
let allBills = JSON.parse(localStorage.getItem("allBills")) || [];
let selectedIndex = parseInt(localStorage.getItem("selectedBillIndex"));

let bill = null;

// Proper validation
if(!isNaN(selectedIndex) && allBills[selectedIndex]){
    bill = allBills[selectedIndex];
} else if(allBills.length > 0){
    bill = allBills[allBills.length - 1];
}

// Clear after use (important)
localStorage.removeItem("selectedBillIndex");

if(bill){

document.getElementById("billNo").innerText = bill.billNo;
document.getElementById("billDate").innerText = bill.date;

document.getElementById("customerSection").innerHTML =
`<strong>Name:</strong> ${bill.name}<br>
<strong>Mobile:</strong> ${bill.mobile}`;

document.getElementById("subtotal").innerText = bill.subtotal;
document.getElementById("discount").innerText = bill.discount;
document.getElementById("finalTotal").innerText = bill.total;
document.getElementById("paymentMode").innerText = bill.paymentMode;
let statusElement = document.getElementById("status");
statusElement.innerText = bill.status;

if(bill.status.toLowerCase() === "paid"){
    statusElement.classList.add("status-paid");
}else{
    statusElement.classList.add("status-unpaid");
}

// Services
let tempDiv = document.createElement("div");
tempDiv.innerHTML = bill.services;
let rows = tempDiv.querySelectorAll("p");

rows.forEach(row=>{
    let tr = document.createElement("tr");
    let td1 = document.createElement("td");
    let td2 = document.createElement("td");

    let parts = row.innerText.split("=");
    td1.innerText = parts[0];
    td2.innerText = parts[1];

    tr.appendChild(td1);
    tr.appendChild(td2);
    document.getElementById("serviceTable").appendChild(tr);
});

// QR
let upiURL = `upi://pay?pa=9661905351@ybl&pn=TECH SOURCE Service&am=${bill.total}&cu=INR`;

new QRCode(document.getElementById("qrcode"), {
text: upiURL,
width:120,
height:120,
});

}

if(bill.status.toLowerCase() === "paid"){

    let qrText = document.getElementById("qrText");
    qrText.innerHTML = `<span class="tick-circle">✔</span> PAID`;
    qrText.classList.add("qr-paid");

    document.getElementById("paidStamp").style.display = "block";

    // 👇 Signature Glow
    document.querySelector(".imglogo").classList.add("signature-paid");

}

// DOWNLOAD PDF
function downloadPDF(){

let buttons = document.querySelector(".buttons");
buttons.style.display = "none";   // 👈 Hide buttons

html2canvas(document.querySelector("#invoice"), {
    scale:2,
    useCORS:true
}).then(canvas=>{

    const { jsPDF } = window.jspdf;
    let pdf = new jsPDF('p','mm','a4');

    let imgData = canvas.toDataURL("image/jpeg",0.9);

    let pageWidth = pdf.internal.pageSize.getWidth();
    let imgHeight = (canvas.height * pageWidth) / canvas.width;

    pdf.addImage(imgData,'JPEG',0,0,pageWidth,imgHeight);

    let billNumber = document.getElementById("billNo").innerText || "NoBill";
    let billDate = document.getElementById("billDate").innerText || "";

    billNumber = billNumber.replace(/[^a-zA-Z0-9]/g, "_");
    billDate = billDate.replace(/[^a-zA-Z0-9]/g, "_");

    pdf.save(`TECH_SOURCE_${billNumber}_${billDate}.pdf`);

    buttons.style.display = "block";  // 👈 Show again

});
}
// SUMMARY TABLE DYNAMIC FILL
let summaryTable = document.querySelector(".summary-table tbody");
summaryTable.innerHTML = ""; // purana clear kar do

// Agar discount > 0 tabhi Subtotal aur Discount dikhe
if(bill.discount && Number(bill.discount) > 0){
    // Subtotal
    if(bill.subtotal && Number(bill.subtotal) > 0){
        let trSubtotal = document.createElement("tr");
        trSubtotal.innerHTML = `<th>Subtotal</th><td>₹ ${bill.subtotal}</td>`;
        summaryTable.appendChild(trSubtotal);
    }

    // Discount
    let trDiscount = document.createElement("tr");
    trDiscount.innerHTML = `<th>Discount</th><td>₹ ${bill.discount}</td>`;
    summaryTable.appendChild(trDiscount);
}

// Final Total (hamesha dikhaye)
let trTotal = document.createElement("tr");
trTotal.innerHTML = `<th>Final Total</th><td>₹ ${bill.total}</td>`;
summaryTable.appendChild(trTotal);

// Payment Mode (sirf Paid ho to)
if(bill.status.toLowerCase() === "paid"){
    let trPayment = document.createElement("tr");
    trPayment.innerHTML = `<th>Payment Mode</th><td>${bill.paymentMode}</td>`;
    summaryTable.appendChild(trPayment);
}

// Status (hamesha show)
let trStatus = document.createElement("tr");

let statusClass = "";
if(bill.status.toLowerCase() === "paid"){
    statusClass = "status-paid";
}else{
    statusClass = "status-unpaid";
}

trStatus.innerHTML = `<th>Status</th>
<td><span class="${statusClass}">${bill.status}</span></td>`;

summaryTable.appendChild(trStatus);

function downloadJPG(){

let buttons = document.querySelector(".buttons");
buttons.style.display = "none";   // 👈 Hide buttons

html2canvas(document.querySelector("#invoice"), {
    scale:2,
    useCORS:true
}).then(canvas=>{

    let imgData = canvas.toDataURL("image/jpeg",0.9);

    let link = document.createElement("a");

    let billNumber = document.getElementById("billNo").innerText || "NoBill";
    let billDate = document.getElementById("billDate").innerText || "";

    billNumber = billNumber.replace(/[^a-zA-Z0-9]/g, "_");
    billDate = billDate.replace(/[^a-zA-Z0-9]/g, "_");

    link.download = `TECH_SOURCE_${billNumber}_${billDate}.jpg`;
    link.href = imgData;
    link.click();

    buttons.style.display = "block";   // 👈 Show again

});
}

if(bill.status.toLowerCase() === "paid"){

    // Change text
 if(bill.status.toLowerCase() === "paid"){

    let qrText = document.getElementById("qrText");
    qrText.innerHTML = '<span class="tick-circle">✔</span> PAID';
    qrText.classList.add("qr-paid");

}

    // Show stamp
    document.getElementById("paidStamp").style.display = "block";

}
</script>
</body>
</html>
