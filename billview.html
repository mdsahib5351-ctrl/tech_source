<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bill View - TECH SOURCE</title>

<style>

body{
margin:0;
background:#d1d1d1;
font-family:Arial;
}

.bill{
max-width:1500px;
background:#fff;
padding:20px;
margin:auto;
border-radius:8px;
}

.billno{
display:flex;
gap: 10px;
align-items:center;
}

.left{
display:flex;
gap:5px; /* Bill No aur value ke bich gap */
}
table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:left;
}

th{
background:#eee;
}

.total{
text-align:right;
font-weight:bold;
margin-top:10px;
}

.btn{
display:inline-block;
margin-top:15px;
background:#4CAF50;
color:#fff;
padding:10px 20px;
border:none;
border-radius:40px;
cursor:pointer;
}

.invoice-container{
width:90%;
max-width:900px;
margin:20px auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.outer-border{
border:2px solid #000;
padding:5px;
}

.inner-border{
border:1px solid #000;
padding:20px;
position:relative;
}

.inner-border::before{
content:"";
position:absolute;
top:60%;
left:50%;
transform:translate(-50%,-50%);
width:65%;
height:65%;
background:url("https://i.ibb.co/B20vV9nR/Screenshot-2026-02-27-06-27-39-13.webp") no-repeat center;
background-size:contain;
opacity:0.2;
pointer-events:none;
}

.header-banner img{
width:100%;
}

.paid-stamp{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) rotate(-15deg);

width:130px;
height:130px;

display:none;
}

.paid-stamp img{
    width:100%;
    height:100%;
object-fit:contain;
opacity:0.9;   /* thoda realistic */
filter: contrast(120) saturate(120);
mix-blend-mode: multiply;
}

.imglogo{
    display: flex;
text-align:center;
border:1px solid #000;
padding:5px;
}

@media print{

body{
background:#fff;
margin:0;
}

.invoice-container{
width:210mm;
min-height:297mm;
margin:0;
padding:10mm;
box-shadow:none;
border-radius:0;
}

.outer-border{
border:2px solid #000;
}

.inner-border{
border:1px solid #000;
}

/* Button hide */
.btn{
display:none;
}

}
.signature-section{
display:flex;
justify-content:space-between;
margin-top:70px;
width:100%;
}

.qr-wrapper{
text-align:center;   /* sab center me aa jayega */
}

.qr-container{
    display: flex;
margin:auto;         /* QR box center */
border:1px solid #000;
padding:10px;
position:relative;
}

.sign-wrapper{
text-align:center;
}

.imglogo img{
width:120px;
height:120px;
object-fit:contain; /* image stretch nahi hoga */
display:block;
margin:auto;
}

.qr-text{
margin-top:8px;
font-size:14px;
font-weight:bold;
}
/* sirf neeche */
.name{
margin:0px;
}
.qr-popup{
  position:fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  display:none; /* default hidden */

  justify-content:center;
  align-items:center;

  background:rgba(0,0,0,0.7);
  z-index:9999;
}

.qr-box{
  background:#fff;
  padding:30px;
  border-radius:12px;
  text-align:center;
  position:relative;

  width:200px;

  /* ✅ Center fix for any case */
  transform: translateY(0);
}
.close-btn{
  position:absolute;
  top:10px;
  right:10px;
  font-size: 40px;
  color: #bb0000;
  cursor:pointer;
  transition:0.2s;
  z-index: 10;
  text-shadow: 0px 4px 8px rgba(0,0,0,0.5);
}

.close-btn:hover{
  transform: scale(1.1);
  opacity:0.8;
}
</style>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body>

<div class="invoice-container" id="invoice">

<div class="outer-border">

<div class="inner-border">

<div class="header-banner">
<img src="https://i.ibb.co/Z6gvXY4v/IMG-20260226-WA0004.webp">
</div>

<div class="bill" id="billDetails"></div>

<div class="signature-section">

<div class="qr-wrapper">

  <div class="qr-container">
    <div id="qrcode"></div>
    <div class="paid-stamp" id="paidStamp">
  <img src="https://i.ibb.co/234wtNnH/Screenshot-2026-03-18-06-07-02-56-removebg-preview.webp" alt="PAID">
</div>
  </div>

  <div class="qr-text" id="qrText">Scan and Pay</div>

</div>

<div class="sign-wrapper">

  <div class="imglogo">
    <img src="https://i.ibb.co/NdyWNrM1/Chat-GPT-Image-Mar-17-2026-11-03-14-AM.jpg" alt="SIGN">
  </div>

  <div class="qr-text">Authorized Signature</div>

</div>
</div>
<button class="btn" onclick="openPayOptions()">Pay Now</button>
</div>
</div>
<button class="btn" onclick="downloadPDF()">Download PDF</button>
<button class="btn" onclick="printBill()">Print Bill</button>

<!-- QR POPUP -->
<div id="payOptions" class="qr-popup">
  <div class="qr-box">
    
    <span class="close-btn" onclick="closePayOptions()">×</span>

    <h2>Select Payment Option</h2>

    <button class="btn" onclick="payUPI()">📱 Pay with UPI App</button><br><br>

    <button class="btn" onclick="openQRPopup()">📷 Scan QR</button><br><br>

    <button class="btn" onclick="copyUPI()">📋 Copy UPI ID</button><br><br>

    <button class="btn" onclick="payWhatsApp()">💬 Pay via WhatsApp</button><br><br>

    <input type="text" id="userUpi" placeholder="Enter UPI ID" 
    style="padding:8px; width:90%; border-radius:8px; border:1px solid #ccc;"><br><br>

<button class="btn" onclick="requestToUser()">📩 Send Request</button>

  </div>
</div>

<div id="qrPopup" class="qr-popup">
  <div class="qr-box">
    
    <span class="close-btn" onclick="closeQR()">×</span>

    <h2>Scan & Pay</h2>

    <div id="bigQR"></div>

    <p id="qrAmountText"></p>

  </div>
</div>
  </div>
</div>
<script>

const firebaseConfig={
apiKey:"AIzaSyDZ-NvSzXJrH8YyvI5GWVWRtZnSNe0NAxU",
authDomain:"tech-source-bill.firebaseapp.com",
projectId:"tech-source-bill"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();

let amount = 0;
let upiId = "7781826687@axl";
let name = "TECH SOURCE";
let currentData = null;
let serviceNames = "";

const billDetails=document.getElementById("billDetails");

const params=new URLSearchParams(window.location.search);

const billNo=params.get("billNo");
const docId=params.get("id");

if(!billNo && !docId){

billDetails.innerHTML="Bill ID missing";

}else{

let query;

if(docId){
query=db.collection("bills").doc(docId).get();
}else{
query=db.collection("bills").where("billNo","==",billNo).get();
}

query.then(snapshot=>{

let data;

if(docId){

if(!snapshot.exists){
billDetails.innerHTML="Bill not found";
return;
}

data=snapshot.data();
currentData = data;

}else{

if(snapshot.empty){
billDetails.innerHTML="Bill not found";
return;
}

data=snapshot.docs[0].data();
}

currentData = data;  // ✅ yahan add karo (common for both cases)

let servicesHTML="";

if(data.services){

data.services.forEach(s=>{

servicesHTML+=`
<tr>
<td>${s.name}</td>
<td>${s.qty}</td>
<td>₹${s.price}</td>
<td>₹${s.qty*s.price}</td>
</tr>
`;

});

}

/* ✅ YAHI PAR ADD KARO */
serviceNames = "";

if(data.services){
    serviceNames = data.services.map(s => s.name).join(", ");
}

/* Amount Calculation */

const totalAmount = data.totalAmount || 0;
const paidAmount = data.paidAmount || 0;
const dueAmount = totalAmount - paidAmount;

billDetails.innerHTML=`

<p class="billno">

  <span class="left">
    <b>Bill No:</b> ${data.billNo}
  </span>
  <span class="date">
    <b>Date:</b>
    ${
    data.date 
    ? (data.date.toDate 
        ? new Date(data.date.toDate()).toLocaleDateString('en-GB').replace(/\//g,'-')
        : new Date(data.date).toLocaleDateString('en-GB').replace(/\//g,'-')
      )
    : ""
    }
  </span>

</p>

<p class="name"><b>Name:</b> ${data.customerName}</p>
<p class="name"><b>Mobile:</b> ${data.customerMobile}</p>

<table>

<thead>
<tr>
<th>Service</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
</tr>
</thead>

<tbody>

${servicesHTML}

</tbody>

</table>
<table style="width:100%; margin-top:10px;">

<tr>

<td colspan="2" style="border:none; padding:0;">

<div style="display:flex; justify-content:space-between; align-items:flex-end;">

<!-- LEFT SIDE (Amount Table) -->
<div style="width:40%;">
<table style="width:100%; border-collapse:collapse;">

${(data.discount||0) > 0 ? `
<tr>
<td>Subtotal</td>
<td>₹${data.subtotal||0}</td>
</tr>` : ``}

${(data.discount||0) > 0 ? `
<tr>
<td>Discount</td>
<td>₹${data.discount||0}</td>
</tr>` : ``}

<tr>
<td><b>Total</b></td>
<td><b>₹${totalAmount}</b></td>
</tr>

${paidAmount > 0 ? `
<tr>
<td>Paid</td>
<td style="color:green;">₹${paidAmount}</td>
</tr>` : ``}

${dueAmount > 0 ? `
<tr>
<td><b>Due</b></td>
<td style="color:red; text-decoration:bold; font-weight:bold;"><b>₹${dueAmount}</b></td>
</tr>` : ``}

</table>
</div>

<!-- RIGHT SIDE (Payment Info) -->
<div style="width:55%; text-align:right;">

<p><b>Payment Status:</b> ${data.paymentStatus}</p>

${data.paymentMode !== "Unpaid" ? `<p><b>Payment Mode:</b> ${data.paymentMode}</p>` : ``}

</div>

</div>

</td>

</tr>

</table>

`;
/* QR Amount Logic */

if(paidAmount <= 0){
amount = totalAmount;
}else{
amount = dueAmount;
}


const upiLink=`upi://pay?pa=${upiId}&pn=${name}&am=${amount}&cu=INR`;
document.getElementById("qrcode").innerHTML = "";

new QRCode(document.getElementById("qrcode"),{
text:upiLink,
width:120,
height:120
});

/* Paid Stamp */

if(data.paymentStatus==="Paid"){
document.getElementById("paidStamp").style.display="block";
document.getElementById("qrText").innerHTML="Payment Completed";

// Pay button hide
document.getElementById("payBtn").style.display="none";
}

});

}
/* PDF */

async function downloadPDF(){

// 🔴 Step 1: Sab button hide karo
const buttons = document.querySelectorAll(".btn");
buttons.forEach(btn => btn.style.display = "none");

const invoice=document.getElementById("invoice");

const canvas=await html2canvas(invoice,{
scale:1.5,
useCORS:true
});

const imgData=canvas.toDataURL("image/jpeg",0.8);

const {jsPDF}=window.jspdf;

const pdf=new jsPDF("p","mm","a4");

const pdfWidth=210;
const pdfHeight=(canvas.height*pdfWidth)/canvas.width;

pdf.addImage(imgData,"JPEG",0,0,pdfWidth,pdfHeight);

pdf.save(`Bill-${currentData.billNo}.pdf`);

// 🔵 Step 2: Wapas show karo
buttons.forEach(btn => btn.style.display = "inline-block");

    }

/* Print */

function printBill(){

window.print();

}

function openPayOptions(){
    if(amount <= 0){
        alert("No payment due");
        return;
    }

    document.getElementById("payOptions").style.display = "flex";
}

function closePayOptions(){
    document.getElementById("payOptions").style.display = "none";
}
function payUPI(){
    const note = encodeURIComponent(
        `Bill ${currentData.billNo} - ${serviceNames}`
    );

    const upiLink = `upi://pay?pa=${upiId}&pn=${name}&am=${amount}&cu=INR&tn=${note}`;

    window.location.href = upiLink;
}

function copyUPI(){
    navigator.clipboard.writeText(upiId);
    alert("UPI ID Copied: " + upiId);
}

function payWhatsApp(){
    const msg = encodeURIComponent(
        `Pay ₹${amount} to ${name}\nUPI: ${upiId}\nBill: ${currentData.billNo}`
    );

    window.open(`https://wame/91${mobile}?text=${msg}`, "_blank");
}

function requestToUser(){
    const userUpi = document.getElementById("userUpi").value.trim();

    if(!userUpi || !userUpi.includes("@")){
        alert("Enter valid UPI ID");
        return;
    }

    const note = encodeURIComponent(
        `Bill ${currentData.billNo} - ${serviceNames}`
    );

    // 🔥 Trick: reverse payment link (user ke side open hoga)
    const upiLink = `upi://pay?pa=${upiId}&pn=${name}&am=${amount}&cu=INR&tn=${note}`;

    alert("Request sent! Ask customer to approve payment.");

    // 👉 user ko share karne ke liye WhatsApp open karo
    const msg = encodeURIComponent(
        `Payment Request\n\nPay ₹${amount} to ${name}\nUPI: ${upiId}\nBill: ${currentData.billNo}`
    );

    window.open(`https://wa.me/?text=${msg}`, "_blank");
}

function openQRPopup(){

    const note = encodeURIComponent(
        `Bill ${currentData.billNo} - ${serviceNames}`
    );

    const upiLink = `upi://pay?pa=${upiId}&pn=${name}&am=${amount}&cu=INR&tn=${note}`;

    document.getElementById("bigQR").innerHTML = "";

    new QRCode(document.getElementById("bigQR"),{
        text: upiLink,
        width:200,
        height:200
    });

    document.getElementById("qrAmountText").innerText = `Amount: ₹${amount}`;

    document.getElementById("qrPopup").style.display = "flex";
}

function closeQR(){
    document.getElementById("qrPopup").style.display = "none";
}
</script>

</body>
</html>
