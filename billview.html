<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bill View - TECH SOURCE</title>

<style>

body{
margin:0;
background:#d1d1d1;
font-family:Arial;
}

.bill{
max-width:1500px;
background:#fff;
padding:20px;
margin:auto;
border-radius:8px;
}

.billno{
display:flex;
gap: 10px;
align-items:center;
}

.left{
display:flex;
gap:5px; /* Bill No aur value ke bich gap */
}
table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:left;
}

th{
background:#eee;
}

.total{
text-align:right;
font-weight:bold;
margin-top:10px;
}

.btn{
display:inline-block;
margin-top:15px;
background:#4CAF50;
color:#fff;
padding:10px 20px;
border:none;
border-radius:40px;
cursor:pointer;
}

.invoice-container{
width:90%;
max-width:900px;
margin:20px auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.outer-border{
border:2px solid #000;
padding:5px;
}

.inner-border{
border:1px solid #000;
padding:20px;
position:relative;
}

.inner-border::before{
content:"";
position:absolute;
top:60%;
left:50%;
transform:translate(-50%,-50%);
width:65%;
height:65%;
background:url("https://i.ibb.co/B20vV9nR/Screenshot-2026-02-27-06-27-39-13.webp") no-repeat center;
background-size:contain;
opacity:0.2;
pointer-events:none;
}

.header-banner img{
width:100%;
}

.paid-stamp{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) rotate(-15deg);

width:130px;
height:130px;

display:none;
}

.paid-stamp img{
    width:100%;
    height:100%;
object-fit:contain;
opacity:0.9;   /* thoda realistic */
filter: contrast(120) saturate(120);
mix-blend-mode: multiply;
}

.imglogo{
    display: flex;
text-align:center;
border:1px solid #000;
padding:5px;
}

@media print{

body{
background:#fff;
margin:0;
}

.invoice-container{
width:210mm;
min-height:297mm;
margin:0;
padding:10mm;
box-shadow:none;
border-radius:0;
}

.outer-border{
border:2px solid #000;
}

.inner-border{
border:1px solid #000;
}

/* Button hide */
.btn{
display:none;
}

}
.signature-section{
display:flex;
justify-content:space-between;
margin-top:70px;
width:100%;
}

.qr-wrapper{
text-align:center;   /* sab center me aa jayega */
}

.qr-container{
    display: flex;
margin:auto;         /* QR box center */
border:1px solid #000;
padding:10px;
position:relative;
}

.sign-wrapper{
text-align:center;
}

.imglogo img{
width:120px;
height:120px;
object-fit:contain; /* image stretch nahi hoga */
display:block;
margin:auto;
}

.qr-text{
margin-top:8px;
font-size:14px;
font-weight:bold;
}
/* sirf neeche */
.name{
margin:0px;
}
</style>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body>

<div class="invoice-container" id="invoice">

<div class="outer-border">

<div class="inner-border">

<div class="header-banner">
<img src="https://i.ibb.co/Z6gvXY4v/IMG-20260226-WA0004.webp">
</div>

<div class="bill" id="billDetails"></div>

<div class="signature-section">

<div class="qr-wrapper">

  <div class="qr-container">
    <div id="qrcode"></div>
    <div class="paid-stamp" id="paidStamp">
  <img src="https://i.ibb.co/234wtNnH/Screenshot-2026-03-18-06-07-02-56-removebg-preview.webp" alt="PAID">
</div>
  </div>

  <div class="qr-text" id="qrText">Scan and Pay</div>

</div>

<div class="sign-wrapper">

  <div class="imglogo">
    <img src="https://i.ibb.co/NdyWNrM1/Chat-GPT-Image-Mar-17-2026-11-03-14-AM.jpg" alt="SIGN">
  </div>

  <div class="qr-text">Authorized Signature</div>

</div>
</div>

<button class="btn" onclick="downloadPDF()">Download PDF</button>
<button class="btn" onclick="printBill()">Print Bill</button>
</div>
<script>

const firebaseConfig={
apiKey:"AIzaSyDZ-NvSzXJrH8YyvI5GWVWRtZnSNe0NAxU",
authDomain:"tech-source-bill.firebaseapp.com",
projectId:"tech-source-bill"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();

const billDetails=document.getElementById("billDetails");

const params=new URLSearchParams(window.location.search);

const billNo=params.get("billNo");
const docId=params.get("id");

if(!billNo && !docId){

billDetails.innerHTML="Bill ID missing";

}else{

let query;

if(docId){
query=db.collection("bills").doc(docId).get();
}else{
query=db.collection("bills").where("billNo","==",billNo).get();
}

query.then(snapshot=>{

let data;

if(docId){

if(!snapshot.exists){
billDetails.innerHTML="Bill not found";
return;
}

data=snapshot.data();

}else{

if(snapshot.empty){
billDetails.innerHTML="Bill not found";
return;
}

data=snapshot.docs[0].data();

}

let servicesHTML="";

if(data.services){

data.services.forEach(s=>{

servicesHTML+=`
<tr>
<td>${s.name}</td>
<td>${s.qty}</td>
<td>₹${s.price}</td>
<td>₹${s.qty*s.price}</td>
</tr>
`;

});

}

/* Amount Calculation */

const totalAmount = data.totalAmount || 0;
const paidAmount = data.paidAmount || 0;
const dueAmount = totalAmount - paidAmount;

billDetails.innerHTML=`

<p class="billno">

  <span class="left">
    <b>Bill No:</b> ${data.billNo}
  </span>
l
  <span class="date">
    <b>Date:</b>
    ${
    data.date 
    ? (data.date.toDate 
        ? new Date(data.date.toDate()).toLocaleDateString('en-GB').replace(/\//g,'-')
        : new Date(data.date).toLocaleDateString('en-GB').replace(/\//g,'-')
      )
    : ""
    }
  </span>

</p>

<p class="name"><b>Name:</b> ${data.customerName}</p>
<p class="name"><b>Mobile:</b> ${data.customerMobile}</p>

<table>

<thead>
<tr>
<th>Service</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
</tr>
</thead>

<tbody>

${servicesHTML}

</tbody>

</table>
<table style="width:100%; margin-top:10px;">

<tr>

<td colspan="2" style="border:none; padding:0;">

<div style="display:flex; justify-content:space-between; align-items:flex-end;">

<!-- LEFT SIDE (Amount Table) -->
<div style="width:40%;">
<table style="width:100%; border-collapse:collapse;">

${(data.discount||0) > 0 ? `
<tr>
<td>Subtotal</td>
<td>₹${data.subtotal||0}</td>
</tr>` : ``}

${(data.discount||0) > 0 ? `
<tr>
<td>Discount</td>
<td>₹${data.discount||0}</td>
</tr>` : ``}

<tr>
<td><b>Total</b></td>
<td><b>₹${totalAmount}</b></td>
</tr>

${paidAmount > 0 ? `
<tr>
<td>Paid</td>
<td>₹${paidAmount}</td>
</tr>` : ``}

${paidAmount > 0 ? `
<tr>
<td><b>Due</b></td>
<td><b>₹${dueAmount}</b></td>
</tr>` : ``}

</table>
</div>

<!-- RIGHT SIDE (Payment Info) -->
<div style="width:55%; text-align:right;">

<p><b>Payment Status:</b> ${data.paymentStatus}</p>

${data.paymentMode !== "Unpaid" ? `<p><b>Payment Mode:</b> ${data.paymentMode}</p>` : ``}

</div>

</div>

</td>

</tr>

</table>

`;

/* QR Amount Logic */

let amount;

if(paidAmount <= 0){
amount = totalAmount;
}else{
amount = dueAmount;
}

/* UPI QR */

const upiId="9661905351@ybl";
const name="TECH SOURCE";

const upiLink=`upi://pay?pa=${upiId}&pn=${name}&am=${amount}&cu=INR`;

new QRCode(document.getElementById("qrcode"),{
text:upiLink,
width:120,
height:120
});

/* Paid Stamp */

if(data.paymentStatus==="Paid"){
document.getElementById("paidStamp").style.display="block";
document.getElementById("qrText").innerHTML="Payment Completed";
}

});

}
/* PDF */

async function downloadPDF(){

const invoice=document.getElementById("invoice");

const canvas=await html2canvas(invoice,{
scale:1.5,
useCORS:true
});

const imgData=canvas.toDataURL("image/jpeg",0.8);

const {jsPDF}=window.jspdf;

const pdf=new jsPDF("p","mm","a4");

const pdfWidth=210;
const pdfHeight=(canvas.height*pdfWidth)/canvas.width;

pdf.addImage(imgData,"JPEG",0,0,pdfWidth,pdfHeight);

pdf.save("bill.pdf");

}

/* Print */

function printBill(){

window.print();

}

</script>

</body>
</html>
