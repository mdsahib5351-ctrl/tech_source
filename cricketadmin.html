<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Admin Panel</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#020617;
    color:#fff;
}

.header{
    background:#111827;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.container{padding:20px}

.card{
    background:#1e293b;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

.status{
    padding:4px 10px;
    border-radius:6px;
}

.pending{background:orange;}
.payment_submitted{background:blue;}
.approved{background:green;}
.rejected{background:red;}

.btn{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    color:#fff;
    margin:5px;
    cursor:pointer;
}

.approve{background:#22c55e;}
.reject{background:#ef4444;}
.delete{background:#eab308;}

.input-group{
    display:flex;
    flex-wrap:wrap;
}

.input-group input{
    margin:5px;
    padding:10px;
    border:none;
    border-radius:6px;
}
.input-group select{
    margin:5px;
    padding:10px;
    border:none;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="header">🧑‍💼 PRO Admin Panel</div>

<div class="container">

<!-- 📢 Announcement -->
<h3>📢 Update Announcement</h3>
<input id="announceInput" placeholder="Enter announcement..." style="width:100%;padding:10px">
<button class="btn approve" onclick="updateAnnouncement()">Update</button>

<hr>

<!-- 🏏 Teams -->
<h3>🏏 All Teams</h3>
<div id="list"></div>

<hr>

<h3>📅 Create Match</h3>

<div class="input-group">
<select id="team1" onchange="fillCaptain(1)"></select>
<input id="captain1" placeholder="Captain 1" readonly>

<select id="team2" onchange="fillCaptain(2)"></select>
<input id="captain2" placeholder="Captain 2" readonly>

<input id="date" placeholder="Match Date (e.g. 10 April)">
<input id="time" placeholder="Time (e.g. 2:00 PM)">
<input id="overs" placeholder="Overs (e.g. 10)">
</div>

<button class="btn approve" onclick="createMatch()">Create Match</button>

</div>
<hr>

<h3>🏆 Declare Result</h3>
<div id="matchList"></div>
<script>

// Firebase config
const firebaseConfig = {

  apiKey: "AIzaSyD8-Rw3iwc5XXMCvzZt8j8fX7Z-F6nGMMc",
  authDomain: "ts-gaming-8ef00.firebaseapp.com",
  databaseURL: "https://ts-gaming-8ef00-default-rtdb.firebaseio.com",
  projectId: "ts-gaming-8ef00",
  storageBucket: "ts-gaming-8ef00.firebasestorage.app",
  messagingSenderId: "622265302154",
  appId: "1:622265302154:web:6feb931ea5619a9ed60173",
  measurementId: "G-1JQRZNGWYT"

};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 📢 Update Announcement
function updateAnnouncement(){
    const text = document.getElementById("announceInput").value;

    db.collection("settings").doc("announcement").set({
        text: text
    });

    alert("Announcement Updated");
}

// 🔄 Load Teams (safe order)
db.collection("tournament")
.orderBy("time","desc")
.onSnapshot(snapshot => {

    let html = "";

    snapshot.forEach(doc => {

        const d = doc.data();

        html += `
        <div class="card">

            <b>🏏 ${d.team}</b><br><br>

            👤 Captain: ${d.captain}<br>
            📞 Mobile: ${d.mobile}<br>
            📍 Place: ${d.place}<br><br>

            Status: <span class="status ${d.status}">${d.status}</span><br>

<div style="margin-top:10px;">

    ${d.status !== 'approved' ? `
        <button class="btn approve" onclick="approve('${doc.id}')">Approve</button>
    ` : ''}

    ${d.status !== 'rejected' ? `
        <button class="btn reject" onclick="reject('${doc.id}')">Reject</button>
    ` : ''}

    <button class="btn delete" onclick="deleteDoc('${doc.id}')">Delete</button>

</div>

        </div>
        `;
    });

    document.getElementById("list").innerHTML = html;

});

// ✅ Approve
function approve(id){
    db.collection("tournament").doc(id).update({
        status: "approved"
    });
}

// ❌ Reject
function reject(id){
    db.collection("tournament").doc(id).update({
        status: "rejected"
    });
}

// X delete
function deleteDoc(id){
    if(confirm("Delete this team?")){
        db.collection("tournament").doc(id).delete();
    }
}
function createMatch(){

    const team1 = document.getElementById("team1").value;
    const team2 = document.getElementById("team2").value;
    const captain1 = document.getElementById("captain1").value;
    const captain2 = document.getElementById("captain2").value;
    const date = document.getElementById("date").value;
    const time = document.getElementById("time").value;
    const overs = document.getElementById("overs").value;

    if(!team1 || !team2 || !captain1 || !captain2 || !date || !time || !overs){
        alert("Sab field fill karo");
        return;
    }

    db.collection("matches").add({
        team1,
        team2,
        captain1,
        captain2,
        date,
        time,
        overs,
        createdAt: new Date()
    });

    alert("Match Created ✅");

    // Clear fields
    document.getElementById("team1").value = "";
    document.getElementById("team2").value = "";
    document.getElementById("captain1").value = "";
    document.getElementById("captain2").value = "";
    document.getElementById("date").value = "";
    document.getElementById("time").value = "";
    document.getElementById("overs").value = "";

}
let teamsData = {};

// 🔄 Load approved teams into dropdown
db.collection("tournament")
.where("status","==","approved")
.onSnapshot(snapshot => {

    let options = '<option value="">Select Team</option>';

    snapshot.forEach(doc => {
        const d = doc.data();

        // store data
        teamsData[d.team] = d;

        options += `<option value="${d.team}">${d.team}</option>`;
    });

    document.getElementById("team1").innerHTML = options;
    document.getElementById("team2").innerHTML = options;

});
function fillCaptain(num){

    const team = document.getElementById("team"+num).value;

    if(teamsData[team]){
        document.getElementById("captain"+num).value = teamsData[team].captain;
    }

}
db.collection("matches")
.orderBy("createdAt","desc")
.onSnapshot(snapshot => {

    let html = "";

    snapshot.forEach(doc => {

        const d = doc.data();

        html += `
        <div class="card">

            <b>🏏 ${d.team1} vs ${d.team2}</b><br><br>

            📅 ${d.date} | ⏰ ${d.time}<br>
            🎯 Overs: ${d.overs}<br><br>

            ${
                d.winner ? 
                `<span style="color:#22c55e;">🏆 Winner: ${d.winner}</span>` :
                `
                <select id="winner_${doc.id}">
                    <option value="">Select Winner</option>
                    <option value="${d.team1}">${d.team1}</option>
                    <option value="${d.team2}">${d.team2}</option>
                </select>

                <button class="btn approve" onclick="declareWinner('${doc.id}')">Save</button>
                `
            }

        </div>
        `;
    });

    document.getElementById("matchList").innerHTML = html;

});
function declareWinner(id){

    const winner = document.getElementById("winner_"+id).value;

    if(!winner){
        alert("Winner select karo");
        return;
    }

    db.collection("matches").doc(id).update({
        winner: winner
    });

    alert("Result Declared ✅");

}
</script>

</body>
</html>
