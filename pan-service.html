<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://i.ibb.co/TBzgsbMS/TS-logo-with-vibrant-gradients.jpg" type="image/jpeg">
    <title>TECH SOURCE - Pan Service</title>
    <link rel="stylesheet" href="css/pan-service.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">

    <!-- Firebase -->
      <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
      <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
      <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- JS -->
    <script src="script/pan-service.js" defer></script>
</head>
<body>
    <header>
  <h2>PAN Card Service</h2>
</header>

<div class="container">
  <button class="btn" onclick="openForm()">New PAN</button>
  <button class="btn" onclick="trackstatus()">Track Status</button>
  <button class="btn" onclick="window.location.href='https://www.pan.utiitsl.com/PAN_ONLINE/ePANCardHome'">UYIISTL Pan Download</button> 
  <button class="btn" onclick="window.location.href='https://onlineservices.proteantech.in/paam/requestAndDownloadEPAN.html'">NSDL Pan Download</button>
</div>

<div id="formScreen" class="fullscreen-form">

<form id="newpanForm">

<h3>Details</h3>

<div class="form-grid">

  <div class="form-group">
    <label>Title</label>
    <select id="title">
      <option>Shri</option>
      <option>Kumari</option>
      <option>Smt</option>
    </select>
  </div>

  <div class="form-group">
    <label>Full Name</label>
    <input type="text" id="name" required>
  </div>

  <div class="form-group">
    <label>Aadhaar Number</label>
    <input type="text" id="aadhar" maxlength="12" required>
  </div>

  <div class="form-group">
    <label>Name as per Aadhaar</label>
    <input type="text" id="nameAadhar" required>
  </div>

  <div class="form-group">
    <label>Date of Birth</label>
    <input type="date" id="dob" required onchange="checkAge()">
  </div>

  <div class="form-group">
    <label>Gender</label>
    <select id="gender" required>
      <option value="">Select</option>
      <option>Male</option>
      <option>Female</option>
    </select>
  </div>
</div>

<h3>Contact Details</h3>
<div class="form-grid">
  <div class="form-group">
    <label>Phone</label>
    <input type="tel" id="phone" required>
  </div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" required>
  </div>
  </div>

  <h3>Parents Details</h3>
  <div class="form-grid">
    <div class="form-group">
      <label>Father's Name</label>
      <input type="text" id="fatherName" required>
    </div>
  </div>

<h3 id="guardianSection" style="display:none;">Guardian Details</h3>

<div class="form-grid" id="guardianFields" style="display:none;">
  <div class="form-group">
    <label>Guardian Full Name</label>
    <input type="text" id="guardianName">
  </div>
</div>

  <h3>Address Details</h3>

<div class="form-grid">
  <div class="form-group">
    <label>Flat No/C/O:</label>
    <input type="text" id="flatNo" required>
  </div>

  <div class="form-group">
    <label>Village/City:</label>
    <input type="text" id="villageCity" required>
  </div>

    <div class="form-group">
      <label>Post Office:</label>
      <input type="text" id="postOffice" required>
    </div>

      <div class="form-group">
        <label>Sub Division:</label>
        <input type="text" id="subDivision" required>
      </div>

    <div class="form-group">
      <label>District:</label>
      <input type="text" id="district" required>
    </div>

    <div class="form-group">
      <label>State:</label>
      <input type="text" id="state" required>
    </div>

    <div class="form-group">
      <label>Pin Code:</label>
      <input type="text" id="pinCode" maxlength="6" required>
</div>
</div>

<h3>Upload Documents</h3>

<div class="form-grid">

  <div class="form-group">
    <label>Photo</label>
    <input type="file" id="photo" required>
  </div>

  <div class="form-group">
    <label>Signature</label>
    <input type="file" id="signature" required>
  </div>

  <div class="form-group">
    <label>Aadhaar Card Front</label>
    <input type="file" id="aadhaarFront" required>
  </div>

  <div class="form-group">
    <label>Aadhaar Card Back</label>
    <input type="file" id="aadhaarBack" required>
  </div>

  <!-- 👇 Guardian Upload (Hidden initially) -->
  <div class="form-group" id="gFrontBox" style="display:none;">
    <label>Guardian Aadhaar Front</label>
    <input type="file" id="guardianAadhaarFront">
  </div>

  <div class="form-group" id="gBackBox" style="display:none;">
    <label>Guardian Aadhaar Back</label>
    <input type="file" id="guardianAadhaarBack">
  </div>

</div>
<br>

<button class="btn" type="submit">Submit</button>
<button class="btn" type="button" onclick="closeForm()">Cancel</button>
   <hr>
<p>Note: All fields are mandatory</p>
      <p>Note: All documents must be in JPG,PDF or PNG format.</p>
      <P>Note: Pan Card Apply Fee: Rs. 190</p>

</form>

</div>
</body>
</html>
