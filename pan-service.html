<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PAN Card Service</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6f9;
}

header {
  background: #2c3e50;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  text-align: center;
  margin-top: 40px;
}

.btn {
  padding: 10px 20px;
  background: #3498db;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

.fullscreen-form {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #ffffff;
  overflow-y: auto;
  padding: 20px;
}

/* GRID LAYOUT */
.form-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

.form-group {
  display: flex;
  flex-direction: column;
}

input, select {
  padding: 8px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

input:focus, select:focus {
  outline: none;
  border: 1px solid #4d5a63;
}

h3 {
  margin-top: 20px;
  background-color: #3498db;
  border-radius: 5px;
  color: white;
  padding: 10px;
}

/* MOBILE */
@media (max-width: 768px) {
  .form-grid {
    grid-template-columns: repeat(1, 1fr);
  }
}

p {
  font-size: 14px;
  text-align: center;
}
</style>

</head>

<body>

<header>
  <h2>PAN Card Service</h2>
</header>

<div class="container">
  <button class="btn" onclick="openForm()">New PAN</button>
  <button class="btn" onclick="trackstatus()">Track Status</button>
  <button class="btn" onclick="window.location.href='https://www.pan.utiitsl.com/PAN_ONLINE/ePANCardHome'">UYIISTL Pan Download</button> 
  <button class="btn" onclick="window.location.href='https://onlineservices.proteantech.in/SiteMaintenance.html'">NSDL Pan Download</button>
</div>

<div id="formScreen" class="fullscreen-form">

<form id="newpanForm">

<h3>Details</h3>

<div class="form-grid">

  <div class="form-group">
    <label>Title</label>
    <select id="tittle">
      <option>Shri</option>
      <option>Kumari</option>
      <option>Smt</option>
    </select>
  </div>

  <div class="form-group">
    <label>Full Name</label>
    <input type="text" id="name" required>
  </div>

  <div class="form-group">
    <label>Aadhaar Number</label>
    <input type="text" id="aadhar" maxlength="12" required>
  </div>

  <div class="form-group">
    <label>Name as per Aadhaar</label>
    <input type="text" id="nameAadhar" required>
  </div>

  <div class="form-group">
    <label>Date of Birth</label>
    <input type="date" id="dob" required>
  </div>

  <div class="form-group">
    <label>Gender</label>
    <select id="gender" required>
      <option value="">Select</option>
      <option>Male</option>
      <option>Female</option>
    </select>
  </div>
</div>

<h3>Contact Details</h3>
<div class="form-grid">
  <div class="form-group">
    <label>Phone</label>
    <input type="tel" id="phone" required>
  </div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" required>
  </div>
  </div>

  <h3>Parents Details</h3>
  <div class="form-grid">
    <div class="form-group">
      <label>Father's Name</label>
      <input type="text" id="fatherName" required>
    </div>
  </div>

  <h3>Address Details</h3>

<div class="form-grid">
  <div class="form-group">
    <label>Flat No/C/O:</label>
    <input type="text" id="flatNo" required>
  </div>

  <div class="form-group">
    <label>Village/City:</label>
    <input type="text" id="villageCity" required>
  </div>

    <div class="form-group">
      <label>Post Office:</label>
      <input type="text" id="postOffice" required>
    </div>

      <div class="form-group">
        <label>Sub Division:</label>
        <input type="text" id="subDivision" required>
      </div>

    <div class="form-group">
      <label>District:</label>
      <input type="text" id="district" required>
    </div>

    <div class="form-group">
      <label>State:</label>
      <input type="text" id="state" required>
    </div>

    <div class="form-group">
      <label>Pin Code:</label>
      <input type="text" id="pinCode" maxlength="6" required>
</div>
</div>

<h3>Upload Documents</h3>

<div class="form-grid">

  <div class="form-group">
    <label>Photo</label>
    <input type="file" required>
  </div>

  <div class="form-group">
    <label>Signature</label>
    <input type="file" required>
  </div>

  <div class="form-group">
    <label>Aadhaar Card Front</label>
    <input type="file" required>
  </div>

  <div class="form-group">
    <label>Aadhaar Card Back</label>
    <input type="file" required>
    </div>

</div>
<br>

<button class="btn" type="submit">Submit</button>
<button class="btn" type="button" onclick="closeForm()">Cancel</button>
   <hr>
<p>Note: All fields are mandatory</p>
      <p>Note: All documents must be in JPG,PDF or PNG format.</p>
      <P>Note: Pan Card Apply Fee: Rs. 190</p>

</form>

</div>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDZ-NvSzXJrH8YyvI5GWVWRtZnSNe0NAxU",
  authDomain: "tech-source-bill.firebaseapp.com",
  databaseURL: "https://tech-source-bill-default-rtdb.firebaseio.com",
  projectId: "tech-source-bill",
  storageBucket: "tech-source-bill.firebasestorage.app",
  messagingSenderId: "690209240188",
  appId: "1:690209240188:web:6e54de365e7f839634c5f9"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let formData = {};

/* OPEN CLOSE */
function openForm(){
  document.getElementById("formScreen").style.display="block";
}

function closeForm(){
  document.getElementById("formScreen").style.display="none";
}

/* IMGBB UPLOAD */
async function uploadToImgBB(file){
  let apiKey = "fa4ad05090c8cc3f9ade673a64a52235";

  let fd = new FormData();
  fd.append("image", file);

  let res = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`,{
    method:"POST",
    body:fd
  });

  let data = await res.json();

  if(data.success){
    return data.data.url;
  }else{
    throw "Upload failed";
  }
}

/* SUBMIT */
document.getElementById("newpanForm").addEventListener("submit", async function(e){
e.preventDefault();

alert("Uploading documents... कृपया इंतजार करें ⏳"); // ✅ यहाँ लगाओ

let files = document.querySelectorAll('#newpanForm input[type="file"]');

try{

let photo = await uploadToImgBB(files[0].files[0]);
let signature = await uploadToImgBB(files[1].files[0]);
let aadhaarFront = await uploadToImgBB(files[2].files[0]);
let aadhaarBack = await uploadToImgBB(files[3].files[0]);
let ackNo = generateAck();

formData = {
  ackNo,
  title: document.getElementById("tittle").value,
  name: document.getElementById("name").value,
  aadhaar: document.getElementById("aadhar").value,
  nameAadhar: document.getElementById("nameAadhar").value,
  dob: document.getElementById("dob").value,
  gender: document.getElementById("gender").value,
  phone: document.getElementById("phone").value,
  email: document.getElementById("email").value,
  father: document.getElementById("fatherName").value,

  flatNo: document.getElementById("flatNo").value,
  villageCity: document.getElementById("villageCity").value,
  postOffice: document.getElementById("postOffice").value,
  subDivision: document.getElementById("subDivision").value,
  district: document.getElementById("district").value,
  state: document.getElementById("state").value,
  pinCode: document.getElementById("pinCode").value,

  photo,
  signature,
  aadhaarFront,
  aadhaarBack,

  status: "pending",
  createdAt: new Date()
};

await db.collection("applications").add(formData);

alert("Application Submitted ✅\nYour Ack No: " + ackNo);

closeForm();

}catch(err){
alert("Error: "+err);
}

});
function generateAck(){
  let date = new Date();

  let y = date.getFullYear();
  let m = String(date.getMonth()+1).padStart(2,'0');
  let d = String(date.getDate()).padStart(2,'0');

  let random = Math.floor(1000 + Math.random()*9000);

  return "PAN" + y + m + d + random;
}

function trackstatus(){
  let ack = prompt("अपना Ack No डालें:");

  if(!ack) return;

  db.collection("applications")
    .where("ackNo","==",ack)
    .get()
    .then(snapshot=>{

      if(snapshot.empty){
        alert("Record नहीं मिला ❌");
        return;
      }

      snapshot.forEach(doc=>{
        let data = doc.data();

        let status =
  data.status === "approved" ? "🟢 Approved" :
  data.status === "under proccess" ? "🟠 Under proccess" :
  data.status === "rejected" ? "🔴 Rejected" :
  "🟡 Pending";

let remark = (data.remark && data.remark.trim() !== "") 
    ? data.remark 
    : "No remark";

alert(
`ACK: ${data.ackNo}

Name: ${data.name}

Status: ${status}

Remark: ${remark}`
);
      });

    })
    .catch(err=>{
      alert("Error: "+err.message);
    });
}
</script>

</body>
</html>
