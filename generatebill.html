<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://i.ibb.co/TBzgsbMS/TS-logo-with-vibrant-gradients.jpg" type="image/jpeg">
    <title>Generate Bill - TECH SOURCE</title>
    <link rel="stylesheet" href="css/generatebill.css">
        <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <!-- JS -->
    <script src="script/generatebill.js" defer></script>
  </head>
<body>
    <h2>Generate New Bill</h2>
    <div class="container">
        <div class="header-banner">
      <img src="https://i.ibb.co/Z6gvXY4v/IMG-20260226-WA0004.webp" alt="TECH SOURCE Banner">
     </div>
    <form id="billForm">
      <div class="rtpsservice">
        <h5>RTPS Services</h5>
        <!--caste-->
        <label>
            <span class="servicesname">Caste Certificate</span>
            <div class="service-row">
                <input type="checkbox" class="service casteCheck" data-name="Caste Certificate" data-type="caste">
                  <select class="casteType">
                     <option value="50">Normal (₹50)</option>
                     <option value="200">Tatkal (₹200)</option>
                  </select>
                <input type="number" min="1" value="1" class="qty">
            </div>
        </label>
        
     <!-- Residential -->
        <label>
           <span class="servicesname">Residential Certificate</span>
            <div class="service-row">
              <input type="checkbox" class="service residentialCheck" data-name="Residential Certificate" data-type="residentil">
                <select class="residentialType">
                  <option value="50">Normal (₹50)</option>
                  <option value="200">Tatkal (₹200)</option>
                </select>
             <input type="number" min="1" value="1" class="qty">
            </div>
        </label>

     <!-- Income -->
        <label> <span class="servicesname">Income Certificate</span>
            <div class="service-row">
              <input type="checkbox" class="service incomeCheck" data-name="Income Certificate" data-type="income">
                <select class="incomeType">
                  <option value="50">Normal (₹50)</option>
                  <option value="200">Tatkal (₹200)</option>
                </select>
             <input type="number" min="1" value="1" class="qty">
            </div>
        </label>

     <!-- EWS -->
        <label><span class="servicesname"> E W S Certificate</span>
            <div class="service-row">
              <input type="checkbox" class="service ewsCheck" data-name="EWS Certificate" data-type="EWS">
                <select class="ewsType">
                  <option value="100">Normal (₹100)</option>
                  <option value="250">Tatkal (₹250)</option>
                </select> <br>
              <input type="number" min="1" value="1" class="qty">
            </div>
        </label>
        </div>

              <!-- Ration Card-->
   <div class="rationservice">
     <h5>Ration Card Services</h5>

     <!-- New Ration Card -->
      <label> <span class="servicesname">New Ration Card Appy</span>
        <div class="service-row">
         <input type="checkbox" class="service newrationcheck" data-name="New Ration Card" data-type="New Ration Cad">
            <Select class="newrationtype">
              <option value="1500">Normal (₹1500)</option>
              <option value="2500">Tatkal (₹2500)</option>
            </Select> <br>
          <input type="number" min="1" value="1" class="qty">
        </div>
      </label>
      
     <!-- Add member -->
      <label> <span class="servicesname">Add member Ration Card</span>
        <div class="service-row">
          <input type="checkbox" class="service addmembercheck" data-name="Add Member Ration Card" data-type="add member ration card">
            <select class="addmembertype">
              <option value="200">Normal (₹200)</option>
              <option value="500">Tatkal (₹500)</option>
            </select>    <br>
          <input type="number" min="1" value="1" class="qty">
        </div>
      </label>
     <!---remove member-->
      <label> <span class="servicesname">Remove Ration Card member</span>
        <div class="service-row">
          <input type="checkbox" class="service removerationcheck" data-name="Add Member Ration Card" data-type="add member ration card">
            <select class="removemembertype">
              <option value="500">Normal (₹500)</option>
              <option value="1000">Tatkal (₹1000)</option>
            </select> <br>
          <input type="number" min="1" value="1" class="qty">
        </div>
      </label>
    </div>
       <!--pan card-->
        <div class="panservice">
        <h5>PAN Services</h5>
        <label><span class="servicesname">New PAN Card</span>
            <div class="service-row">
                <input type="checkbox" class="service" data-name="New PAN Card" data-price="200">
                <input type="number" min="1" value="1" class="qty">
            </div>
        </label>
        <label><span class="servicesname">PAN Card Correction</span>
            <div class="service-row">
                <input type="checkbox" class="service" data-name="Correction PAN Card" data-price="200">
                <input type="number" min="1" value="1" class="qty">
            </div>
        </label>
        </div>

                      <!-- Aadhar -->
         <div class="aadharservice">
           <h5>Aadhar Card Services</h5>
             <label><span class="servicesname">Address Update</span>
               <div class="service-row">
                 <input type="checkbox" class="service" data-name="Aadhar Card Address Update" data-price="150">
                 <input type="number" min="1" value="1" class="qty">
               </div>
             </label>
              <!--Aadhar mobile number update-->
             <label><span class="servicesname">Mobile Number Update</span>
               <div class="service-row">
                 <input type="checkbox" class="service" data-name="Aadhar Card Mobile Number Update" data-price="150">
                 <input type="number" min="1" value="1" class="qty">
               </div>
             </label>
         </div>
               <!--  voter id card  -->
         <div class="voterservice">
           <h5>Voter Card Service</h5>
             <label><span class="servicesname">New Voter I'D</span>
               <div class="service-row">
                 <input type="checkbox" class="service" data-name="New Voter I'D Card" data-price="200">
                 <input type="number" min="1" value="1" class="qty">
               </div>
             </label>
              <!--voter cerrection-->
             <label><span class="servicesname">Correction Voter I'D card</span>
               <div class="service-row">
                 <input type="checkbox" class="service" data-name="Voter Card Correction" data-price="200">
                 <input type="number" min="1" value="1" class="qty">
               </div>
             </label>
              <!--voter mobile number update-->
             <label><span class="servicesname">Voter Card Number Update</span>
               <div class="service-row">
                 <input type="checkbox" class="service" data-name="Voter Card Number Update" data-price="50">
                 <input type="number" min="1" value="1" class="qty">
               </div>
             </label>
         </div>
             <!-- Print -->
         <div class="printservice">
           <h5>Print Service</h5>
              <label><span class="servicesname">Photo Copy</span>
                <div class="service-row">
                  <input type="checkbox" class="service" data-name="Photo Copy" data-price="3">
                  <input type="number" min="1" value="1" class="qty">
                </div>
              </label>
               <!--passport size photo-->
              <label><span class="servicesname">Passport Size Photo</span>
                <div class="service-row">
                  <input type="checkbox" class="service" data-name="Passport Size Photo" data-price="5">
                  <input type="number" min="6" value="6" class="qty">
                </div>
              </label>
               <!--photo copy clr-->
              <label><span class="servicesname">Photo Copy Colour</span>
                <div class="service-row">
                  <input type="checkbox" class="service" data-name="Photo Copy Colour" data-price="10">
                  <input type="number" min="1" value="1" class="qty">
                </div>
              </label>
               <!--print out-->
              <label><span class="servicesname">Print Out</span>
                <div class="service-row">
                  <input type="checkbox" class="service" data-name="Print Out" data-price="10">
                  <input type="number" min="1" value="1" class="qty">
                </div>
               </label>
                <!--PVC card print-->
               <label><span class="servicesname">PVC Card Print</span>
                 <div class="service-row">
                   <input type="checkbox" class="service" data-name="PVC Card Print" data-price="50">
                   <input type="number" min="1" value="1" class="qty">
                 </div>
               </label>
         </div>
         <div class="billing-section">
        <h4>Billing Details</h4>
        <div class="billing-grid">
        <div class="billing-field">
            Payment Status
            <select id="paymentStatus">
                <option value="Unpaid">Unpaid</option>
                <option value="Paid">Paid</option>
            </select>
        </div>
        <div class="billing-field">
            Payment Mode
            <select id="paymentMode">
                <option value="Unpaid">Unpaid</option>
                <option value="Cash">Cash</option>
                <option value="UPI">UPI</option>
            </select>
        </div>
        <div class="billing-field">
            Discount Amount
            <input type="number" id="discountInput" placeholder="Enter Discount Amount">
        </div>
        <div class="billing-field">
            Customer Name
            <input type="text" id="customerName" placeholder="Enter customer name">
        </div>
        <div class="billing-field">
            Mobile Number
            <input type="tel" id="customerMobile" placeholder="Enter Mobile Number" maxlength="10" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        </div>
   </div>
 </div>
 <div class="groupbtn">
      <button type="submit" class="genratebillbtn"></button></div>

    </form>
        <div class="groupbtn">
      <button class="printbtn" onclick="window.print()"></button>
      <button class="billprevbtn" onclick="viewBill('${doc.id}')"></button>
      <button class="historybtn" onclick="openAdmin()"></button>
      <button class="" onclick="logout()">Logout</button>
    </div>
