<!DOCTYPE html>
<html>  
<head>
<title>Result</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: rgb(216, 216, 216);
    text-align: center;
    margin: 0;
    padding: 0;
}

h1 {
    margin-top: 50px;
    color: rgb(255, 255, 255);
}

form {
    background: rgb(255, 255, 255);
    padding: 30px;
    margin: 40px auto;
    width: 300px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    border: 5px solid rgb(0, 0, 0);
}

.input input {
    display: block;
    width: 90%;
    padding: 10px;
    margin: 10px auto;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 16px;
}

.input input:focus {
    border-color: #4facfe;
    outline: none;
}

.button {
    background: #4facfe;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
}

.button:hover {
    background: #00c6ff;
}

p {
    color: white;
}
</style>
</head>
<body>

<h1>Result</h1>

<form onsubmit="checkresult(event)">
<label class="input">
    <input type="text" id="rollcode" placeholder="ENTER ROLL CODE">
    <input type="number" id="rollnumber" placeholder="ENTER ROLL NUMBER">
</label>
<button type="submit" class="button">Submit</button>
</form>

<script>
// page load hote hi roll code auto fill karega
window.onload = function () {
    let savedRollCode = localStorage.getItem("rollcode");
    if (savedRollCode) {
        document.getElementById("rollcode").value = savedRollCode;
    }
};

function checkresult(event) {
    event.preventDefault();

    let rollcode = document.getElementById("rollcode").value;
    let rollnumber = document.getElementById("rollnumber").value;

    // roll code save kar lo
    localStorage.setItem("rollcode", rollcode);

    let ref = `https://matricbiharboard.com/result?roll_code=${rollcode}&roll_no=${rollnumber}`;

    // new tab me open
    window.open(ref, "_blank");
}
</script>

</body>
</html>
