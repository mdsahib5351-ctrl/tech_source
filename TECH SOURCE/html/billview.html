<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bill View - TECH SOURCE</title>
<link rel="stylesheet" href="../css/billview.css">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- js -->
    <script src="../script/billview.js" defer></script>
</head>

<body>

<div class="invoice-container" id="invoice">

<div class="outer-border">

<div class="inner-border">

<div class="header-banner">
<img src="https://i.ibb.co/Z6gvXY4v/IMG-20260226-WA0004.webp">
</div>

<div class="bill" id="billDetails"></div>

<div class="signature-section">

<div class="qr-wrapper">

  <div class="qr-container">
    <div id="qrcode"></div>
    <div class="paid-stamp" id="paidStamp">
  <img src="https://i.ibb.co/234wtNnH/Screenshot-2026-03-18-06-07-02-56-removebg-preview.webp" alt="PAID">
</div>
  </div>

  <div class="qr-text" id="qrText">Scan and Pay</div>

</div>

<div class="sign-wrapper">

  <div class="imglogo">
    <img src="https://i.ibb.co/NdyWNrM1/Chat-GPT-Image-Mar-17-2026-11-03-14-AM.jpg" alt="SIGN">
  </div>

  <div class="qr-text">Authorized Signature</div>

</div>
</div>
<button class="btn" onclick="openPayOptions()">Pay Now</button>
</div>
</div>
<button class="btn" onclick="downloadPDF()">Download PDF</button>
<button class="btn" onclick="printBill()">Print Bill</button>

<!-- QR POPUP -->
<div id="payOptions" class="qr-popup">
  <div class="qr-box">
    
    <span class="close-btn" onclick="closePayOptions()">×</span>

    <h2>Select Payment Option</h2>

    <button class="btn" onclick="payUPI()">📱 Pay with UPI App</button><br><br>

    <button class="btn" onclick="openQRPopup()">📷 Scan QR</button><br><br>

    <button class="btn" onclick="copyUPI()">📋 Copy UPI ID</button><br><br>

    <button class="btn" onclick="payWhatsApp()">💬 Pay via WhatsApp</button><br><br>

    <input type="text" id="userUpi" placeholder="Enter UPI ID" 
    style="padding:8px; width:90%; border-radius:8px; border:1px solid #ccc;"><br><br>

<button class="btn" onclick="requestToUser()">📩 Send Request</button>

  </div>
</div>

<div id="qrPopup" class="qr-popup">
  <div class="qr-box">
    
    <span class="close-btn" onclick="closeQR()">×</span>

    <h2>Scan & Pay</h2>

    <div id="bigQR"></div>

    <p id="qrAmountText"></p>

  </div>
</div>
  </div>
</div>
