<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Image Uploader</title>
<link rel="stylesheet" href="css/image.css">
</head>

<body>

<button class="dark-btn" onclick="toggleDark()">🌙</button>

<div class="box">

  <div class="menu">
    <button onclick="showTab('upload')" class="active-btn">Upload</button>
    <button onclick="showTab('history')">History</button>
  </div>

  <!-- Upload -->
  <div id="upload" class="tab active">
    <div id="drop" class="drop">
      <p>📂 Drag & Drop Images</p>
      <span>or click to upload</span>
      <input type="file" id="file" multiple accept="image/*">
    </div>

    <div id="preview" class="preview"></div>
  </div>

  <!-- History -->
  <div id="history" class="tab">
    <h3>Upload History</h3>
    <div id="historyBox"></div>
    <button onclick="clearHistory()">Clear History</button>
  </div>

</div>

<!-- Fullscreen Preview -->
<div id="viewer" class="viewer" onclick="this.style.display='none'">
  <img id="viewerImg">
</div>

<script src="script/image.js"></script>
</body>
</html>
