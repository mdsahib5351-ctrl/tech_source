<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pro Image Uploader v3</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:30px;
transition:0.3s;
}

.dark{background:#121212;color:white;}
.box{background:white;padding:25px;width:500px;margin:auto;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.2);}
.dark .box{background:#1e1e1e;color:white;}
.menu{margin-bottom:15px;}
.menu button{padding:8px 15px;margin:3px;cursor:pointer;}
.tab{display:none;}
.tab.active{display:block;}
.drop{border:2px dashed #999;padding:30px;border-radius:10px;cursor:pointer;}
.preview{display:flex;flex-wrap:wrap;gap:10px;margin-top:15px;justify-content:center;}
.card{position:relative;border:1px solid #ddd;padding:5px;border-radius:8px;}
.card img{width:90px;height:90px;object-fit:cover;border-radius:5px;}
.delete{position:absolute;top:-6px;right:-6px;background:red;color:white;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;}
.progress{height:6px;background:#ddd;margin-top:5px;border-radius:5px;overflow:hidden;}
.bar{height:100%;width:0%;background:#28a745;}
.link-box{margin-top:5px;display:flex;align-items:center;gap:5px;}
.link-box input{flex:1;padding:4px;}
.history img{width:50px;margin:3px;border-radius:5px;}
</style>
</head>
<body>

<button onclick="toggleDark()">🌙 Dark Mode</button>

<div class="box">

<div class="menu">
<button onclick="showTab('upload')">Upload</button>
<button onclick="showTab('history')">History</button>
</div>

<!-- Upload Tab -->
<div id="upload" class="tab active">
<div class="drop" id="drop">Drag & Drop Images<input type="file" id="file" multiple hidden></div>
<div class="preview" id="preview"></div>
</div>

<!-- History Tab -->
<div id="history" class="tab">
<h3>Upload History</h3>
<div id="historyBox"></div>
</div>

</div>

<script>
const API="https://api.imgbb.com/1/upload?key=fa4ad05090c8cc3f9ade673a64a52235"
const drop=document.getElementById("drop")
const fileInput=document.getElementById("file")
const preview=document.getElementById("preview")
const historyBox=document.getElementById("historyBox")

drop.onclick=()=>fileInput.click()
drop.ondragover=e=>{e.preventDefault()}
drop.ondrop=e=>{e.preventDefault();handleFiles(e.dataTransfer.files)}
fileInput.onchange=e=>handleFiles(e.target.files)

function handleFiles(files){
for(let file of files){
compress(file).then(f=>{
createPreview(f)
upload(f)
})
}
}

function createPreview(file){
let card=document.createElement("div")
card.className="card"
card.draggable=true

let img=document.createElement("img")
img.src=URL.createObjectURL(file)

let del=document.createElement("div")
del.className="delete"
del.innerHTML="×"
del.onclick=()=>card.remove()

let progress=document.createElement("div")
progress.className="progress"
let bar=document.createElement("div")
bar.className="bar"
progress.appendChild(bar)

let linkBox=document.createElement("div")
linkBox.className="link-box"
let input=document.createElement("input")
input.type="text"
input.readOnly=true
let copyBtn=document.createElement("button")
copyBtn.textContent="Copy"
copyBtn.onclick=()=>{input.select();document.execCommand("copy");alert("Link Copied!")}

linkBox.appendChild(input)
linkBox.appendChild(copyBtn)

card.appendChild(img)
card.appendChild(del)
card.appendChild(progress)
card.appendChild(linkBox)
preview.appendChild(card)
}

function upload(file){
let form=new FormData()
form.append("image",file)
let xhr=new XMLHttpRequest()
xhr.open("POST",API)
xhr.upload.onprogress=e=>{
if(e.lengthComputable){
let percent=(e.loaded/e.total)*100
let bars=document.querySelectorAll(".bar")
bars[bars.length-1].style.width=percent+"%"
}
}
xhr.onload=()=>{
let res=JSON.parse(xhr.responseText)
let url=res.data.url
// set link in preview
let lastInput=document.querySelectorAll(".link-box input")
lastInput[lastInput.length-1].value=url
saveHistory(url)
}
xhr.send(form)
}

function compress(file){
return new Promise(resolve=>{
let img=new Image()
let reader=new FileReader()
reader.onload=e=>img.src=e.target.result
img.onload=()=>{
let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")
let max=800
let w=img.width
let h=img.height
if(w>max){h=h*(max/w);w=max}
canvas.width=w
canvas.height=h
ctx.drawImage(img,0,0,w,h)
canvas.toBlob(blob=>{
resolve(new File([blob],file.name,{type:"image/jpeg"}))
},"image/jpeg",0.7)
}
reader.readAsDataURL(file)
})
}

function toggleDark(){document.body.classList.toggle("dark")}

// Tabs
function showTab(id){
document.querySelectorAll(".tab").forEach(tab=>tab.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

// Upload History
function saveHistory(url){
let hist=JSON.parse(localStorage.getItem("imgHistory")||"[]")
hist.push(url)
localStorage.setItem("imgHistory",JSON.stringify(hist))
loadHistory()
}

function loadHistory(){
let hist=JSON.parse(localStorage.getItem("imgHistory")||"[]")
historyBox.innerHTML=""
hist.reverse().forEach(url=>{
let div=document.createElement("div")
div.style.marginBottom="10px"
let img=document.createElement("img")
img.src=url
img.style.verticalAlign="middle"
let input=document.createElement("input")
input.type="text"
input.value=url
input.readOnly=true
input.style.width="60%"
let copyBtn=document.createElement("button")
copyBtn.textContent="Copy"
copyBtn.onclick=()=>{input.select();document.execCommand("copy");alert("Link Copied!")}

div.appendChild(img)
div.appendChild(input)
div.appendChild(copyBtn)
historyBox.appendChild(div)
})
}

loadHistory()
</script>
</body>
</html>
