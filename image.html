<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Image Upload → Real URL</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:40px;
}

.box{
background:white;
padding:25px;
width:420px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
margin-top:10px;
}

img{
max-width:200px;
margin-top:15px;
border-radius:8px;
}

textarea{
width:100%;
height:70px;
margin-top:10px;
padding:8px;
}

button{
padding:10px 20px;
margin-top:10px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.copy{
background:#007bff;
}

</style>

</head>

<body>

<div class="box">

<h2>Upload Image → Get URL</h2>

<input type="file" id="imageInput" onchange="preview()">

<br>

<img id="previewImg">

<br>

<button onclick="upload()">Upload Image</button>

<textarea id="link" placeholder="Image URL will appear here"></textarea>

<br>

<button class="copy" onclick="copy()">Copy Link</button>

</div>

<script>

function preview(){

let file=document.getElementById("imageInput").files[0]

let reader=new FileReader()

reader.onload=function(e){

document.getElementById("previewImg").src=e.target.result

}

reader.readAsDataURL(file)

}

function upload(){

let file=document.getElementById("imageInput").files[0]

if(!file){

alert("Please select image")

return

}

let formData=new FormData()

formData.append("image",file)

fetch("https://api.imgbb.com/1/upload?key=fa4ad05090c8cc3f9ade673a64a52235",{
method:"POST",
body:formData
})
.then(res=>res.json())
.then(data=>{

document.getElementById("link").value=data.data.url

})

}

function copy(){

let link=document.getElementById("link")

link.select()

document.execCommand("copy")

alert("Link Copied!")

}

window.onload=function(){

let img=localStorage.getItem("qrImage");

if(!img) return;

// base64 को blob में convert
fetch(img)
.then(res=>res.blob())
.then(blob=>{

let formData=new FormData();
formData.append("image",blob);

fetch("https://api.imgbb.com/1/upload?key=fa4ad05090c8cc3f9ade673a64a52235",{
method:"POST",
body:formData
})
.then(res=>res.json())
.then(data=>{

let url=data.data.url;

// bill info
let mobile=localStorage.getItem("remindMobile");
let name=localStorage.getItem("remindName");
let amount=localStorage.getItem("remindAmount");
let billNo=localStorage.getItem("remindBillNo");

// whatsapp message
let message=`Hello ${name}

Bill No: ${billNo}
Amount: ₹${amount}

Scan QR and Pay
${url}

TECH SOURCE`;

let encoded=encodeURIComponent(message);

window.open(`https://wa.me/91${mobile}?text=${encoded}`);

});

});

}

</script>

</body>
</html>
